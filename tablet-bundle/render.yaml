services:
  - type: web
    name: futurescaping-labs-homepage
    runtime: static
    plan: free
    buildCommand: "true"
    staticPublishPath: .
    autoDeployTrigger: commit
    previews:
      generation: automatic
    headers:
      - path: /*
        name: X-Frame-Options
        value: SAMEORIGIN
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: Referrer-Policy
        value: strict-origin-when-cross-origin
